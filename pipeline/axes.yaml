# Compositional task axes (decision 003, paper Table 8).
#
# Three axis shapes the sampler understands:
#   - flat:      `values: [...]`            sampled uniformly
#   - weighted:  `weighted: {value: w}`     normalized, then sampled
#   - per_domain:`per_domain: {domain: [...]}`  indexed by the drawn domain
# Axes are resolved top-to-bottom so domain-conditioned axes see `domain`.
#
# Reduced scope (decision 001 Dev 2 / PROJECT_SPEC Phase 2):
#   fixture = text_only only; verifier in {exact_text, metric_threshold}.
# Lists marked "(authored)" are ours — the paper never publishes them (flag 1).

version: 1

axes:
  # ---- flat categorical ----
  domain:                     # 9, paper Table 8 (seeded from Pi et al. 2026)
    values:
      - security
      - software_engineering
      - file_operations
      - data_querying
      - data_science
      - debugging
      - scientific_computing
      - data_processing
      - system_administration

  task_complexity:            # 4 buckets, uniform (§3.1); descriptions authored (flag 3)
    values: [short, moderate, complex, intricate]
    descriptions:
      short: "1-5 shell commands; a single file or directory; one obvious step."
      moderate: "5-15 commands; one or two tools chained; a couple of files."
      complex: "15-30 commands; multi-file; at least one non-obvious step or edge case."
      intricate: "an intricate multi-stage workflow of 30-60 commands."

  command_complexity:         # 3, paper Table 8; descriptions authored (flag 3)
    values: [bash_only, bash_code, bash_code_services]
    descriptions:
      bash_only: "solvable with shell built-ins and standard coreutils only."
      bash_code: "requires writing and running a short program (e.g. Python/C)."
      bash_code_services: "requires standing up a local service/process (no network)."

  fixture:                    # paper's 7 reduced to 1 (decision 001)
    values: [text_only]

  verifier:                   # paper's 5 reduced to 2 (decision 001); see [[verifiers]]
    values: [exact_text, metric_threshold]

  # ---- weighted categorical ----
  language:                   # paper: "8 (weighted)"; weights authored (flag 2)
    weighted:
      python: 0.40            # biased toward what our base images carry
      bash: 0.30
      any: 0.15
      c: 0.05
      cpp: 0.04
      go: 0.03
      rust: 0.02
      multi_language: 0.01

  # ---- domain-conditioned (drawn after `domain`) ----
  skill_type:                 # paper: 4-7 per domain (authored, flag 1)
    per_domain:
      security: [web_security, cryptography, forensics, hardening, auth]
      software_engineering: [algorithmic, refactoring, testing, build_systems, apis]
      file_operations: [organization, search_and_filter, archival, permissions]
      data_querying: [sql, log_querying, json_query, aggregation]
      data_science: [statistics, feature_engineering, modeling, visualization]
      debugging: [tracing, root_cause, patching, regression_isolation]
      scientific_computing: [numerical, simulation, signal_processing, linear_algebra]
      data_processing: [etl, text_processing, format_conversion, streaming, dedup]
      system_administration: [process_mgmt, networking_local, scheduling, packaging, monitoring]

  primitive_skills:           # paper: 20-40 per domain, sample 3-5 (authored ~15/domain, flag 1)
    sample: {min: 3, max: 5}
    per_domain:
      security:
