# Default harness run config. CLI flags override these values.
# Paper reference points are in docs/notes/paper/harness.md (Table 13).

model: claude-haiku-4-5-20251001
temperature: 1.0
max_steps: 30          # paper: 64 tool steps; we default lower (decision 001)
cmd_timeout: 120       # seconds per command, identical to paper Table 13
max_reply_tokens: 4096 # per-turn model max_tokens (paper: 16384; lowered for cost)
max_output_chars: 10000
token_budget: 200000
k: 4
network: none          # task containers get no network at runtime
memory: 2g
cpus: 2.0
pids_limit: 512        # fork-bomb guard; shared by gate and eval (decision 003)
